<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 管理后台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg-warm);
    }
    .login-card {
      background: white;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 300;
      text-align: center;
      margin-bottom: 0.5rem;
      font-family: var(--font-heading);
      letter-spacing: 0.05em;
    }
    .login-subtitle {
      font-size: 0.8125rem;
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-error {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.75rem 1rem;
      font-size: 0.8125rem;
      margin-bottom: 1rem;
      display: none;
    }
    .login-error.show {
      display: block;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: 0;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: var(--font-body);
    }
    .form-group input:focus {
      border-color: var(--color-text);
    }
    .login-btn {
      width: 100%;
      padding: 0.875rem;
      background: var(--color-text);
      color: white;
      border: none;
      border-radius: 0;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .login-btn:hover {
      background: var(--color-text-secondary);
    }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .login-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">管理后台</h1>
    <p class="login-subtitle">请输入账号密码登录</p>

    <div class="login-error" id="error-message"></div>

    <form id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">登 录</button>
    </form>

    <div class="login-footer">
      <a href="../" style="color:var(--color-text-tertiary);text-decoration:none;">← 返回首页</a>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    // 如果已登录，直接跳转
    if (Auth.isLoggedIn()) {
      window.location.href = 'index.html';
    }

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('请填写用户名和密码');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '验证中...';
      errorMsg.classList.remove('show');

      const result = await Auth.login(username, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        showError(result.error);
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }

    // 回车提交
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        form.dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
